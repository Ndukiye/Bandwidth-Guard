name: bandwidth-guard
version: '1.0'
summary: eBPF bandwidth monitoring
description: |
  Monitor network bandwidth per process using eBPF.
  Requires daemon installed separately via install.sh.
title: Bandwidth Guard
license: MIT
contact: orukariandukiye@gmail.com
grade: stable
confinement: classic
base: core22

apps:
  bwguard:
    command: venv/bin/python $SNAP/src/main.py
  bandwidth-guard:
    command: venv/bin/python $SNAP/src/main.py
    aliases:
      - bwguard

parts:
  bandwidth-guard:
    plugin: dump
    source: .
    build-packages:
      - python3-venv
      - python3-pip
    override-build: |
      craftctl default
      python3 -m venv $CRAFT_PART_INSTALL/venv
      $CRAFT_PART_INSTALL/venv/bin/pip install -r requirements.txt